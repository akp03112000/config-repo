server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:

        # 🔐 AUTH SERVICE
        - id: auth-service
          uri: lb://auth-service
          predicates:
            - Path=/auth/**

        # 🛍️ CATALOG SERVICE
        - id: catalog-service
          uri: lb://catalog-service
          predicates:
            - Path=/products/**

        # 📦 ORDER SERVICE
        - id: order-service
          uri: lb://order-service
          predicates:
            - Path=/orders/**

        # 🧑‍💼 ADMIN SERVICE
        - id: admin-service
          uri: lb://admin-service
          predicates:
            - Path=/admin/**

        # 🔥 SWAGGER DOC ROUTES

        # 🔥 SWAGGER DOC ROUTES (FIXED)

- id: auth-docs
  uri: lb://auth-service
  predicates:
    - Path=/auth/v3/api-docs
  filters:
    - RewritePath=/auth/(?<segment>.*), /${segment}

- id: catalog-docs
  uri: lb://catalog-service
  predicates:
    - Path=/catalog/v3/api-docs
  filters:
    - RewritePath=/catalog/(?<segment>.*), /${segment}

- id: order-docs
  uri: lb://order-service
  predicates:
    - Path=/order/v3/api-docs
  filters:
    - RewritePath=/order/(?<segment>.*), /${segment}

- id: admin-docs
  uri: lb://admin-service
  predicates:
    - Path=/admin/v3/api-docs
  filters:
    - RewritePath=/admin/(?<segment>.*), /${segment}

# 🔥 CENTRAL SWAGGER UI CONFIG

springdoc:
  swagger-ui:
    config-url: /v3/api-docs/swagger-config
    urls:
      - name: Auth Service
        url: /auth/v3/api-docs
      - name: Catalog Service
        url: /catalog/v3/api-docs
      - name: Order Service
        url: /order/v3/api-docs
      - name: Admin Service
        url: /admin/v3/api-docs
springdoc:
  api-docs:
    enabled: true
